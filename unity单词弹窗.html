<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  color: #e0e0e0;
}
.card {
  background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
  padding: 40px; width: 520px; max-width: 95vw;

}
.card::before {
  content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: linear-gradient(45deg, #e94560, #533483, #0f3460, #e94560);

}
@keyframes glow { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
.progress-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; font-size: 14px; color: #aaa; }
.progress-track { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #533483); border-radius: 3px; transition: width 0.4s ease; }
.category { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 12px; background: rgba(233,69,96,0.2); color: #e94560; margin-bottom: 16px; }

.phonetic { font-size: 15px; color: #888; margin-bottom: 20px; }
.meaning { font-size: 18px; line-height: 1.7; color: #ccc; min-height: 60px; padding: 16px;

.meaning.hidden { color: transparent; text-shadow: 0 0 16px rgba(255,255,255,0.3); }
.meaning .hint { font-size: 13px; color: #666; display: block; margin-top: 4px; }
.meaning.hidden .hint { display: none; }
.example { font-size: 13px; color: #777; line-height: 1.6; margin-bottom: 24px; padding: 0 4px;
  min-height: 40px; transition: opacity 0.3s; }
.example.hidden { opacity: 0; }
.btns { display: flex; gap: 12px; }
.btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; }
.btn:active { transform: scale(0.96); }
.btn-forget { background: rgba(233,69,96,0.2); color: #e94560; }
.btn-forget:hover { background: rgba(233,69,96,0.35); }
.btn-fuzzy { background: rgba(255,183,77,0.2); color: #ffb74d; }
.btn-fuzzy:hover { background: rgba(255,183,77,0.35); }
.btn-know { background: rgba(76,175,80,0.2); color: #66bb6a; }
.btn-know:hover { background: rgba(76,175,80,0.35); }
.stats { display: flex; justify-content: center; gap: 30px; margin-top: 20px; font-size: 13px; color: #666; }
.stats span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-forget { background: #e94560; } .dot-fuzzy { background: #ffb74d; } .dot-know { background: #66bb6a; }
.keyboard-hint { text-align: center; margin-top: 14px; font-size: 12px; color: #555; }

.settings-group {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;

.settings-group label { font-size: 14px; color: #ccc; white-space: nowrap; }

.library-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }

.library-item:hover { background: rgba(255,255,255,0.1); }
.library-item-word { font-size: 16px; font-weight: 600; color: #fff; }
.library-item-word small { font-size: 12px; font-weight: 400; color: #666; margin-left: 6px; }
.library-item-meaning { font-size: 13px; color: #999; flex: 1; margin: 0 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mastery-badge {
  font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap;

.mastery-badge.forget { background: rgba(233,69,96,0.2); color: #e94560; }
.mastery-badge.fuzzy { background: rgba(255,183,77,0.2); color: #ffb74d; }
.mastery-badge.know { background: rgba(76,175,80,0.2); color: #66bb6a; }

/* Word detail styles */
.word-detail-section { padding: 14px; background: rgba(255,255,255,0.04); border-radius: 12px; margin-bottom: 12px; }

/* TTS speak button */
.speak-btn {

}

.speak-btn:active { transform: scale(0.9); }

<div class="card" id="app"></div>
<script>
// ===== TTS 语音朗读工具 =====
const TTS = {
  supported: typeof window !== 'undefined' && 'speechSynthesis' in window,
  _currentBtn: null,

  speak(text, btn) {
    if (!this.supported) return;
    window.speechSynthesis.cancel();
    if (this._currentBtn) this._currentBtn.classList.remove('speaking');
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    // Try to pick an English voice
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utter.voice = enVoice;
    if (btn) { btn.classList.add('speaking'); this._currentBtn = btn; }
    utter.onend = () => { if (btn) btn.classList.remove('speaking'); this._currentBtn = null; };
    utter.onerror = () => { if (btn) btn.classList.remove('speaking'); this._currentBtn = null; };
    window.speechSynthesis.speak(utter);
  }
};
// Preload voices
if (TTS.supported) window.speechSynthesis.getVoices();

const words = [
  // ===== 核心概念 =====

  {word:"Component",phonetic:"/kəmˈpoʊnənt/",meaning:"组件 — 附加到GameObject上的功能模块，定义其行为和外观",example:"Add a Rigidbody component to enable physics.",exampleCn:"添加一个刚体组件来启用物理效果。",category:"核心概念"},
  {word:"Transform",phonetic:"/trænsˈfɔːrm/",meaning:"变换 — 每个GameObject必有的组件，控制位置、旋转和缩放",example:"Use Transform.position to move the object.",exampleCn:"使用Transform.position来移动对象。",category:"核心概念"},
  {word:"Prefab",phonetic:"/ˈpriːfæb/",meaning:"预制体 — 可复用的GameObject模板，存储为项目资源",example:"Instantiate a prefab to spawn enemies at runtime.",exampleCn:"在运行时实例化预制体来生成敌人。",category:"核心概念"},
  {word:"Scene",phonetic:"/siːn/",meaning:"场景 — 包含游戏环境和菜单的独立内容单元",example:"Load the next scene using SceneManager.",exampleCn:"使用SceneManager加载下一个场景。",category:"核心概念"},
  {word:"Asset",phonetic:"/ˈæset/",meaning:"资源 — 项目中使用的任何媒体或数据文件",example:"Import the texture asset into the project.",exampleCn:"将纹理资源导入到项目中。",category:"核心概念"},
  {word:"Tag",phonetic:"/tæɡ/",meaning:"标签 — 用于标识和分类GameObject的引用字符串",example:"Use CompareTag(\"Player\") to check identity.",exampleCn:"使用CompareTag(\"Player\")来检查身份。",category:"核心概念"},
  {word:"Layer",phonetic:"/ˈleɪər/",meaning:"层 — 用于选择性渲染、碰撞检测和射线投射的分组机制",example:"Set the layer to 'Ignore Raycast' to skip detection.",exampleCn:"将层设置为'忽略射线检测'来跳过检测。",category:"核心概念"},
  {word:"Script",phonetic:"/skrɪpt/",meaning:"脚本 — 用C#编写的代码文件，定义游戏逻辑和行为",example:"Attach the PlayerController script to the character.",exampleCn:"将PlayerController脚本附加到角色上。",category:"核心概念"},

  {word:"Nested Prefab",phonetic:"/nestɪd ˈpriːfæb/",meaning:"嵌套预制体 — 包含其他预制体实例的预制体",example:"Nest the wheel prefab inside the car prefab.",exampleCn:"将车轮预制体嵌套在汽车预制体内。",category:"核心概念"},
  {word:"Prefab Variant",phonetic:"/ˈpriːfæb ˈvɛriənt/",meaning:"预制体变体 — 基于另一个预制体创建的带有覆盖属性的版本",example:"Create a Prefab Variant for the elite enemy.",exampleCn:"为精英敌人创建一个预制体变体。",category:"核心概念"},

  // ===== 编辑器 =====
  {word:"Inspector",phonetic:"/ɪnˈspektər/",meaning:"检视面板 — 显示和编辑选中对象组件属性的窗口",example:"Adjust values directly in the Inspector panel.",exampleCn:"直接在检视面板中调整数值。",category:"编辑器"},

  {word:"Game View",phonetic:"/ɡeɪm vjuː/",meaning:"游戏视图 — 模拟最终渲染效果的预览窗口",example:"Check the Game View to see the player's perspective.",exampleCn:"查看游戏视图以观察玩家的视角。",category:"编辑器"},
  {word:"Project Window",phonetic:"/ˈprɒdʒekt ˈwɪndoʊ/",meaning:"项目窗口 — 浏览和管理项目中所有资源文件的面板",example:"Drag assets from the Project window into the scene.",exampleCn:"从项目窗口将资源拖入场景中。",category:"编辑器"},
  {word:"Console",phonetic:"/kənˈsoʊl/",meaning:"控制台 — 显示日志、警告和错误信息的窗口",example:"Check the Console for Debug.Log messages.",exampleCn:"在控制台中查看Debug.Log消息。",category:"编辑器"},
  {word:"Toolbar",phonetic:"/ˈtuːlbɑːr/",meaning:"工具栏 — 编辑器顶部的控制栏，包含播放/暂停等按钮",example:"Click Play in the Toolbar to test the game.",exampleCn:"点击工具栏中的播放按钮来测试游戏。",category:"编辑器"},

  {word:"Asset Store",phonetic:"/ˈæset stɔːr/",meaning:"资源商店 — Unity官方的资源和插件市场",example:"Download free assets from the Asset Store.",exampleCn:"从资源商店下载免费资源。",category:"编辑器"},

  // ===== 脚本编程 =====
  {word:"MonoBehaviour",phonetic:"/ˈmɒnoʊ bɪˈheɪvjər/",meaning:"MonoBehaviour — Unity脚本的基类，提供生命周期回调方法",example:"All Unity scripts inherit from MonoBehaviour.",exampleCn:"所有Unity脚本都继承自MonoBehaviour。",category:"脚本编程"},
  {word:"Instantiate",phonetic:"/ɪnˈstænʃieɪt/",meaning:"实例化 — 在运行时克隆对象或预制体",example:"Instantiate(bulletPrefab, firePoint.position, rotation);",exampleCn:"实例化子弹预制体，在发射点位置和旋转处生成。",category:"脚本编程"},

// ===== Storage 数据持久化层 =====
const Storage = {
  STORAGE_KEY: 'unity-vocab-data',

  load() {
    try {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      if (raw === null) return null;
      return JSON.parse(raw);
    } catch (e) {
      return null;
    }
  },

  save(data) {
    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
  },

  validate(data) {
    if (!data || typeof data !== 'object') return false;
    if (!data.version || !data.settings || !data.plan || !data.progress) return false;
    if (typeof data.settings.dailyNewWords !== 'number') return false;
    if (data.settings.dailyNewWords < 5 || data.settings.dailyNewWords > 50) return false;
    if (!Array.isArray(data.plan.groups)) return false;
    return true;
  },

  reset() {
    const today = new Date().toISOString().slice(0, 10);
    const data = {
      version: 1,
      settings: { dailyNewWords: 20 },
      plan: { startDate: today, currentGroupIndex: 0, groups: [] },
      progress: {},
      session: { date: today, mode: null, currentIndex: 0, stats: { forget: 0, fuzzy: 0, know: 0 }, reviewQueue: [] },
      extractedWords: { cached: false, words: [] },
      extractedPlan: { currentGroupIndex: 0, groups: [] }
    };
    this.save(data);
    return data;
  }
};

// ===== PlanEngine 每日计划引擎 =====
const PlanEngine = {
  generateGroups(wordPool, dailyCount) {
    const groups = [];
    for (let i = 0; i < wordPool.length; i += dailyCount) {
      const chunk = wordPool.slice(i, i + dailyCount);
      groups.push({ words: chunk.map(w => w.word) });
    }
    return groups;
  },

  getTodayWords(appData) {
    const groups = appData.plan.groups;
    let idx = appData.plan.currentGroupIndex;

    while (idx < groups.length) {
      const group = groups[idx];
      const remaining = group.words.filter(key => !(key in appData.progress));
      if (remaining.length > 0) {
        appData.plan.currentGroupIndex = idx;
        return remaining
          .map(key => words.find(w => w.word === key))
          .filter(Boolean);
      }
      idx++;
    }

    appData.plan.currentGroupIndex = idx;
    return [];
  },

  completeDailySession(appData) {
    appData.plan.currentGroupIndex += 1;
    Storage.save(appData);
  },

  getCurrentDay(appData) {
    const start = new Date(appData.plan.startDate);
    const today = new Date();
    start.setHours(0, 0, 0, 0);
    today.setHours(0, 0, 0, 0);
    const diff = today.getTime() - start.getTime();
    return Math.floor(diff / (1000 * 60 * 60 * 24));
  },

  setDailyCount(appData, count) {
    if (typeof count !== 'number' || count < 5 || count > 50) {
      return false;
    }
    appData.settings.dailyNewWords = count;

    // Collect unlearned words (preserve learned progress)
    const learnedKeys = new Set(Object.keys(appData.progress));
    const unlearnedWords = words.filter(w => !learnedKeys.has(w.word));

    // Regenerate groups for unlearned words only
    appData.plan.groups = this.generateGroups(unlearnedWords, count);
    appData.plan.currentGroupIndex = 0;

    Storage.save(appData);
    return true;
  }
};

// ===== ReviewEngine 间隔复习引擎 =====
const ReviewEngine = {
  KNOWN_INTERVALS: [1, 3, 7, 15],

  calcNextReview(masteryLevel, consecutiveKnown) {
    if (masteryLevel === 'know') {
      if (consecutiveKnown >= 4) {
        return { interval: -1, mastered: true };
      }
      return { interval: this.KNOWN_INTERVALS[consecutiveKnown - 1] || 15, mastered: false };
    }
    if (masteryLevel === 'fuzzy') {
      return { interval: 1, mastered: false };
    }
    // forget
    return { interval: 0, mastered: false };
  },

  getDueWords(appData, today) {
    const dueKeys = [];
    const progress = appData.progress;
    for (const key in progress) {
      const record = progress[key];
      if (record.mastered === true) continue;
      if (record.nextReviewDate && record.nextReviewDate <= today) {
        dueKeys.push(key);
      }
    }
    return dueKeys
      .map(key => words.find(w => w.word === key))
      .filter(Boolean);
  },

  updateReview(appData, wordKey, masteryLevel) {
    if (!appData.progress[wordKey]) {
      appData.progress[wordKey] = {
        masteryLevel: masteryLevel,
        learnedDate: new Date().toISOString().slice(0, 10),
        lastReviewDate: null,
        nextReviewDate: null,
        consecutiveKnown: 0,
        mastered: false,
        history: []
      };
    }

    const record = appData.progress[wordKey];
    const today = new Date().toISOString().slice(0, 10);

    if (masteryLevel === 'know') {
      record.consecutiveKnown = (record.consecutiveKnown || 0) + 1;
    } else {
      record.consecutiveKnown = 0;
    }

    record.masteryLevel = masteryLevel;

    const result = this.calcNextReview(masteryLevel, record.consecutiveKnown);

    if (result.mastered) {
      record.mastered = true;
      record.nextReviewDate = null;
    } else {
      record.mastered = false;
      const nextDate = new Date(today);
      nextDate.setDate(nextDate.getDate() + result.interval);
      record.nextReviewDate = nextDate.toISOString().slice(0, 10);
    }

    record.lastReviewDate = today;

    if (!record.history) {
      record.history = [];
    }
    record.history.push({ date: today, level: masteryLevel });

    Storage.save(appData);
  },

  isMastered(wordRecord) {
    return (wordRecord.consecutiveKnown >= 4) || (wordRecord.mastered === true);
  }
};

// ===== Extractor 例句单词提取器 =====
const Extractor = {
  STOP_WORDS: new Set([
    'a', 'the', 'is', 'to', 'for', 'in', 'on', 'of', 'and', 'or', 'it', 'this', 'that',
    'with', 'from', 'at', 'by', 'an', 'as', 'be', 'are', 'was', 'were', 'has', 'have',
    'had', 'do', 'does', 'did', 'not', 'no', 'but', 'if', 'so', 'up', 'out', 'all',
    'can', 'will', 'may', 'use', 'new', 'set'
  ]),

  extractFromSentence(sentence, existingWords) {
    if (!sentence || typeof sentence !== 'string') return [];
    const tokens = sentence.match(/[a-zA-Z]+/g);
    if (!tokens) return [];
    const seen = new Set();
    const result = [];
    for (const token of tokens) {
      const lower = token.toLowerCase();
      if (lower.length < 2) continue;
      if (this.STOP_WORDS.has(lower)) continue;
      if (existingWords.has(lower)) continue;
      if (seen.has(lower)) continue;
      seen.add(lower);
      result.push(lower);
    }
    return result;
  },

  extractAll(wordPool) {
    if (!wordPool || !Array.isArray(wordPool)) return [];
    const professionalWords = new Set();
    for (const item of wordPool) {
      if (item.word) {
        const parts = item.word.match(/[a-zA-Z]+/g);
        if (parts) {
          for (const part of parts) {
            professionalWords.add(part.toLowerCase());
          }
        }
      }
    }
    const wordSourcesMap = new Map();
    for (const item of wordPool) {
      if (!item.example) continue;
      const extracted = this.extractFromSentence(item.example, professionalWords);
      for (const w of extracted) {
        if (!wordSourcesMap.has(w)) {
          wordSourcesMap.set(w, []);
        }
        wordSourcesMap.set(w, wordSourcesMap.get(w).concat(item.example));
      }
    }
    const result = [];
    for (const [word, sources] of wordSourcesMap) {
      result.push({ word, sources });
    }
    result.sort((a, b) => a.word.localeCompare(b.word));
    return result;
  },

  filter(rawWords, professionalWords) {
    if (!rawWords || !Array.isArray(rawWords)) return [];
    const seen = new Set();
    const result = [];
    for (const w of rawWords) {
      const lower = typeof w === 'string' ? w.toLowerCase() : '';
      if (!lower || lower.length < 2) continue;
      if (this.STOP_WORDS.has(lower)) continue;
      if (professionalWords && professionalWords.has(lower)) continue;
      if (seen.has(lower)) continue;
      seen.add(lower);
      result.push(lower);
    }
    return result;
  }
};

// ===== AppState 应用状态管理器 =====
const AppState = {
  currentView: 'dashboard',
  data: null,
  sessionState: {
    deck: [],
    currentIndex: 0,
    revealed: false,
    stats: { forget: 0, fuzzy: 0, know: 0 },
    reviewQueue: [],
    mode: null
  },
  _selectedWord: null,

  init() {
    let data = Storage.load();
    if (data === null || !Storage.validate(data)) {
      data = Storage.reset();
      alert('学习数据已重置');
    }
    this.data = data;

    // Generate plan groups if empty
    if (!this.data.plan.groups || this.data.plan.groups.length === 0) {
      this.data.plan.groups = PlanEngine.generateGroups(words, this.data.settings.dailyNewWords);
      Storage.save(this.data);
    }

    // Extract words if not cached
    if (!this.data.extractedWords.cached) {
      const extracted = Extractor.extractAll(words);
      this.data.extractedWords = { cached: true, words: extracted };
      this.data.extractedPlan.groups = PlanEngine.generateGroups(
        extracted.map(e => ({ word: e.word })),
        this.data.settings.dailyNewWords
      );
      this.data.extractedPlan.currentGroupIndex = 0;
      Storage.save(this.data);
    }

    this.currentView = 'dashboard';
    renderDashboard();
  },

  switchView(targetView) {
    // Save current session progress if in a learning/review mode
    if (this.currentView === 'dailyLearn' || this.currentView === 'review' || this.currentView === 'extractedLearn') {
      this.saveSession();
    }

    this.currentView = targetView;

    switch (targetView) {
      case 'dashboard':
        renderDashboard();
        break;
      case 'dailyLearn':
        renderDailyLearn();
        break;
      case 'review':
        renderReview();
        break;
      case 'library':
        renderLibrary();
        break;
      case 'wordDetail':
        renderWordDetail(this._selectedWord);
        break;
      case 'extractedLearn':
        renderExtractedLearn();
        break;
      case 'settings':
        renderSettings();
        break;
    }
  },

  getStats() {
    const today = new Date().toISOString().slice(0, 10);
    const daysLearned = PlanEngine.getCurrentDay(this.data);
    const totalLearned = Object.keys(this.data.progress).length;
    const dueReviewCount = ReviewEngine.getDueWords(this.data, today).length;

    // Calculate today's progress within current group
    const groups = this.data.plan.groups;
    const idx = this.data.plan.currentGroupIndex;
    let todayProgress = 0;
    let todayTotal = 0;
    if (idx < groups.length) {
      const currentGroup = groups[idx];
      todayTotal = currentGroup.words.length;
      todayProgress = currentGroup.words.filter(key => key in this.data.progress).length;
    }

    const overallProgress = words.length > 0 ? Math.round(totalLearned / words.length * 100) : 0;
    const allDone = totalLearned >= words.length;

    return {
      daysLearned,
      totalLearned,
      dueReviewCount,
      todayProgress,
      todayTotal,
      overallProgress,
      allDone
    };
  },

  saveSession() {
    this.data.session = {
      date: new Date().toISOString().slice(0, 10),
      mode: this.sessionState.mode,
      currentIndex: this.sessionState.currentIndex,
      stats: { ...this.sessionState.stats },
      reviewQueue: this.sessionState.reviewQueue.map(w => typeof w === 'string' ? w : w.word)
    };
    Storage.save(this.data);
  }
};

  return '<button class="speak-btn" id="' + id + '" onclick="event.stopPropagation();TTS.speak(\'' + text.replace(/'/g, "\\'").replace(/"/g, '&quot;') + '\', this)" title="朗读">🔊</button>';
}

// ===== renderDashboard 主导航界面 =====
function renderDashboard() {
  const stats = AppState.getStats();
  const extractedCount = AppState.data.extractedWords.words ? AppState.data.extractedWords.words.length : 0;
  const app = document.getElementById('app');

  let navButtons = '';

  // 继续学习按钮
  if (stats.allDone) {
    navButtons += `<button class="nav-btn nav-btn-learn" disabled>
      <span>📖 继续学习<br><span class="nav-sub">所有新单词已学完</span></span>
    </button>`;
  } else {
    navButtons += `<button class="nav-btn nav-btn-learn" onclick="AppState.switchView('dailyLearn')">
      <span>📖 继续学习<br><span class="nav-sub">今日进度: ${stats.todayProgress}/${stats.todayTotal}</span></span>
    </button>`;
  }

// ===== renderDailyLearn 每日学习视图 =====
function renderDailyLearn() {
  const todayWords = PlanEngine.getTodayWords(AppState.data);
  const app = document.getElementById('app');

  if (todayWords.length === 0) {
    app.innerHTML = `
      <div class="complete">
        <h2>🎉 所有新单词已学完</h2>
        <p>你已经学完了所有新单词，继续复习巩固吧！</p>
        <button class="restart" onclick="AppState.switchView('dashboard')">← 返回</button>
      </div>
    `;
    return;
  }

  const today = new Date().toISOString().slice(0, 10);
  const session = AppState.data.session;

  // Check if there's a saved session for today with the same mode
  if (session && session.date === today && session.mode === 'dailyLearn') {
    // Restore session
    const shuffledDeck = todayWords.slice();
    AppState.sessionState = {
      deck: shuffledDeck,
      currentIndex: Math.min(session.currentIndex || 0, shuffledDeck.length),
      revealed: false,
      stats: session.stats ? { ...session.stats } : { forget: 0, fuzzy: 0, know: 0 },
      reviewQueue: (session.reviewQueue || []).map(key => words.find(w => w.word === key)).filter(Boolean),
      mode: 'dailyLearn'
    };
  } else {
    // New session
    const shuffledDeck = todayWords.slice();
    for (let i = shuffledDeck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffledDeck[i], shuffledDeck[j]] = [shuffledDeck[j], shuffledDeck[i]];
    }
    AppState.sessionState = {
      deck: shuffledDeck,
      currentIndex: 0,
      revealed: false,
      stats: { forget: 0, fuzzy: 0, know: 0 },
      reviewQueue: [],
      mode: 'dailyLearn'
    };
  }

  renderCurrentCard();
}

function renderCurrentCard() {
  const ss = AppState.sessionState;
  const app = document.getElementById('app');

  if (ss.currentIndex >= ss.deck.length) {
    if (ss.reviewQueue.length > 0) {
      // Restart with review queue (shuffle it)
      const rq = ss.reviewQueue.slice();
      for (let i = rq.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [rq[i], rq[j]] = [rq[j], rq[i]];
      }
      ss.deck = rq;
      ss.reviewQueue = [];
      ss.currentIndex = 0;
      ss.revealed = false;
      renderCurrentCard();
      return;
    }

    // Completion screen
    const total = ss.stats.forget + ss.stats.fuzzy + ss.stats.know;
    const knowPct = total ? Math.round((ss.stats.know / total) * 100) : 0;

function dailyToggleReveal() {
  AppState.sessionState.revealed = true;
  const meaningEl = document.getElementById('daily-meaning');
  const exampleEl = document.getElementById('daily-example');
  const exampleCnEl = document.getElementById('daily-example-cn');
  if (meaningEl) meaningEl.classList.remove('hidden');
  if (exampleEl) exampleEl.classList.remove('hidden');
  if (exampleCnEl) exampleCnEl.classList.remove('hidden');
}

function dailyAnswer(type) {
  const ss = AppState.sessionState;
  if (!ss.revealed) { dailyToggleReveal(); return; }

  const w = ss.deck[ss.currentIndex];

  // Update stats
  ss.stats[type]++;

  // Update progress record
  const today = new Date().toISOString().slice(0, 10);
  const masteryMap = { forget: 'forget', fuzzy: 'fuzzy', know: 'know' };
  const masteryLevel = masteryMap[type];

  if (!AppState.data.progress[w.word]) {
    AppState.data.progress[w.word] = {
      masteryLevel: masteryLevel,
      learnedDate: today,
      lastReviewDate: null,
      nextReviewDate: null,
      consecutiveKnown: 0,
      mastered: false,
      history: []
    };
  }

  // Use ReviewEngine to update review schedule
  ReviewEngine.updateReview(AppState.data, w.word, masteryLevel);

  // Add to reviewQueue if forget or fuzzy
  if (type === 'forget' || type === 'fuzzy') {
    ss.reviewQueue.push(w);
  }

  // Increment currentIndex
  ss.currentIndex++;

  // Save session
  AppState.saveSession();

  // Render next card
  renderCurrentCard();
}

// ===== 已学单词库 =====
let _libraryFilters = { category: '', level: '', search: '' };

function filterLibraryWords() {
  const progress = AppState.data.progress;
  const keys = Object.keys(progress);
  if (keys.length === 0) return [];

  let list = keys.map(k => {
    const w = words.find(w => w.word === k);
    if (!w) return null;
    return { ...w, progress: progress[k] };
  }).filter(Boolean);

  if (_libraryFilters.category) {
    list = list.filter(w => w.category === _libraryFilters.category);
  }
  if (_libraryFilters.level) {
    list = list.filter(w => w.progress.masteryLevel === _libraryFilters.level);
  }
  if (_libraryFilters.search) {
    const q = _libraryFilters.search.toLowerCase();
    list = list.filter(w => w.word.toLowerCase().includes(q) || w.meaning.toLowerCase().includes(q));
  }
  return list;
}

function updateLibraryFilter(type, value) {
  _libraryFilters[type] = value;
  renderLibrary();
}

function renderLibrary() {
  const progress = AppState.data.progress;
  const learnedKeys = Object.keys(progress);

  if (learnedKeys.length === 0) {
    app.innerHTML = '<button class="back-btn" onclick="AppState.switchView(\'dashboard\')">← 返回</button>' +
      '<div class="dashboard-title">📋 已学单词库</div>' +
      '<p style="text-align:center;color:#888;margin-top:40px;">还没有学过的单词</p>';
    return;
  }

  // Collect unique categories from learned words
  const categories = [...new Set(learnedKeys.map(k => {
    const w = words.find(w => w.word === k);
    return w ? w.category : null;
  }).filter(Boolean))];

  const filtered = filterLibraryWords();

  const levelLabels = { '': '全部', forget: '不认识', fuzzy: '模糊', know: '认识' };
  const masteryLabels = { forget: '不认识', fuzzy: '模糊', know: '认识' };

  let html = '<button class="back-btn" onclick="AppState.switchView(\'dashboard\')">← 返回</button>';
  html += '<div class="dashboard-title">📋 已学单词库</div>';

  // Search input
  html += '<input class="library-search" type="text" placeholder="搜索单词或释义..." value="' +
    (_libraryFilters.search || '').replace(/"/g, '&quot;') +
    '" oninput="updateLibraryFilter(\'search\', this.value)">';

  // Category filter dropdown
  html += '<div class="library-filters">';
  html += '<select class="library-search" style="width:auto;margin-bottom:0;flex-shrink:0;" onchange="updateLibraryFilter(\'category\', this.value)">';
  html += '<option value=""' + (_libraryFilters.category === '' ? ' selected' : '') + '>全部分类</option>';
  categories.forEach(c => {
    html += '<option value="' + c + '"' + (_libraryFilters.category === c ? ' selected' : '') + '>' + c + '</option>';
  });
  html += '</select>';

  // Mastery level filter buttons
  ['', 'forget', 'fuzzy', 'know'].forEach(lv => {
    const active = _libraryFilters.level === lv ? ' active' : '';
    html += '<button class="library-filter-btn' + active + '" onclick="updateLibraryFilter(\'level\', \'' + lv + '\')">' + levelLabels[lv] + '</button>';
  });
  html += '</div>';

  // Word list
  if (filtered.length === 0) {
    html += '<p style="text-align:center;color:#888;margin-top:30px;">没有匹配的单词</p>';
  } else {
    html += '<div class="library-list">';
    filtered.forEach(w => {
      const badge = masteryLabels[w.progress.masteryLevel] || '未知';
      const badgeClass = w.progress.masteryLevel || 'know';
      html += '<div class="library-item" onclick="AppState._selectedWord=words.find(x=>x.word===\'' + w.word.replace(/'/g, "\\'") + '\');AppState.switchView(\'wordDetail\')">';
      html += '<div><span class="library-item-word">' + w.word + '<small>' + (w.phonetic || '') + '</small></span></div>';
      html += '<span class="library-item-meaning">' + w.meaning + '</span>';
      html += '<span class="mastery-badge ' + badgeClass + '">' + badge + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  app.innerHTML = html;
}

    html += '<div><span class="word-detail-label">最近复习日期</span><div class="word-detail-value">' + (progress.lastReviewDate || '未知') + '</div></div>';

    var lvl = progress.masteryLevel || 'know';
    html += '<div><span class="word-detail-label">当前掌握等级</span><div class="word-detail-value"><span class="mastery-badge ' + masteryColors[lvl] + '">' + (masteryLabels[lvl] || lvl) + '</span></div></div>';

    html += '<div><span class="word-detail-label">连续认识次数</span><div class="word-detail-value">' + (progress.consecutiveKnown || 0) + '</div></div>';
    html += '<div><span class="word-detail-label">是否已掌握</span><div class="word-detail-value">' + (progress.mastered ? '✅ 已掌握' : '❌ 未掌握') + '</div></div>';

    html += '</div>';

    if (progress.history && progress.history.length > 0) {
      html += '<div style="margin-top:14px;"><span class="word-detail-label">学习时间线</span></div>';
      html += '<div class="history-timeline" style="margin-top:8px;">';
      progress.history.forEach(function(h) {
        var hLvl = h.level || 'know';
        html += '<div class="history-item"><span>' + h.date + '</span><span class="mastery-badge ' + masteryColors[hLvl] + '">' + (masteryLabels[hLvl] || hLvl) + '</span></div>';
      });

  }

  html += '</div>';
  app.innerHTML = html;
}

function renderExtractedLearn() {
  const app = document.getElementById('app');
  const extractedWords = AppState.data.extractedWords.words;
  const extractedPlan = AppState.data.extractedPlan;

  if (!extractedWords || extractedWords.length === 0 || extractedPlan.currentGroupIndex >= extractedPlan.groups.length) {
    app.innerHTML = `
      <div class="complete">
        <h2>📚 没有更多例句词汇</h2>
        <p>所有例句词汇已学完或暂无可学内容</p>
        <button class="restart" onclick="AppState.switchView('dashboard')">← 返回</button>
      </div>
    `;
    return;
  }

  const currentGroup = extractedPlan.groups[extractedPlan.currentGroupIndex];
  const groupWordKeys = currentGroup.words;

  // Filter out already learned extracted words
  const unlearnedKeys = groupWordKeys.filter(function(key) {
    return !(key in AppState.data.progress);
  });

  if (unlearnedKeys.length === 0) {
    // All words in this group are learned, advance to next group
    extractedPlan.currentGroupIndex++;
    Storage.save(AppState.data);
    renderExtractedLearn();
    return;
  }

  // Build word-like objects for display
  const extractedMap = {};
  extractedWords.forEach(function(ew) { extractedMap[ew.word] = ew; });

  const deck = unlearnedKeys.map(function(key) {
    const ew = extractedMap[key];
    return {
      word: key,
      phonetic: '',
      meaning: ew ? ew.sources.join(' | ') : '来自例句的常用词汇',
      example: '来自例句的常用词汇',
      category: '例句词汇'
    };
  });

  // Shuffle deck
  for (var i = deck.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = deck[i]; deck[i] = deck[j]; deck[j] = temp;
  }

  AppState.sessionState = {
    deck: deck,
    currentIndex: 0,
    revealed: false,
    stats: { forget: 0, fuzzy: 0, know: 0 },
    reviewQueue: [],
    mode: 'extractedLearn'
  };

  renderExtractedCard();
}

function renderExtractedCard() {
  var ss = AppState.sessionState;
  var app = document.getElementById('app');

  if (ss.currentIndex >= ss.deck.length) {
    if (ss.reviewQueue.length > 0) {
      var rq = ss.reviewQueue.slice();
      for (var i = rq.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = rq[i]; rq[i] = rq[j]; rq[j] = temp;
      }
      ss.deck = rq;
      ss.reviewQueue = [];
      ss.currentIndex = 0;
      ss.revealed = false;
      renderExtractedCard();
      return;
    }

    // Completion: advance extractedPlan.currentGroupIndex
    var total = ss.stats.forget + ss.stats.fuzzy + ss.stats.know;
    var knowPct = total ? Math.round((ss.stats.know / total) * 100) : 0;
    AppState.data.extractedPlan.currentGroupIndex++;
    Storage.save(AppState.data);

    app.innerHTML = '<div class="complete">' +
      '<h2>🎉 例句词汇学习完成</h2>' +
      '<p>共学习 ' + total + ' 个单词</p>' +
      '<p>✅ 认识 ' + ss.stats.know + ' &nbsp; 🤔 模糊 ' + ss.stats.fuzzy + ' &nbsp; 😵 不认识 ' + ss.stats.forget + '</p>' +
      '<p>掌握率 ' + knowPct + '%</p>' +
      '<button class="restart" onclick="AppState.switchView(\'dashboard\')">← 返回主页</button>' +
      '</div>';
    return;
  }

  var w = ss.deck[ss.currentIndex];
  var deckTotal = ss.deck.length;
  var pct = Math.round((ss.currentIndex / deckTotal) * 100);
  ss.revealed = false;

  app.innerHTML = '<button class="back-btn" onclick="AppState.switchView(\'dashboard\')">← 返回</button>' +
    '<div class="progress-bar">' +
      '<span>' + (ss.currentIndex + 1) + ' / ' + deckTotal + '</span>' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<span>' + pct + '%</span>' +
    '</div>' +
    '<div class="category">例句词汇</div>' +
    '<div class="word">' + w.word + ' ' + speakBtnHtml(w.word, 'speak-word') + '</div>' +
    '<div class="phonetic">' + (w.phonetic || '') + '</div>' +
    '<div class="meaning hidden" id="extracted-meaning" onclick="extractedToggleReveal()">' +
      w.meaning +
      '<span class="hint">点击或按空格显示来源例句</span>' +
    '</div>' +
    '<div class="example hidden" id="extracted-example">' + w.example + '</div>' +
    '<div class="btns">' +
      '<button class="btn btn-forget" onclick="extractedAnswer(\'forget\')" title="快捷键: 1">😵 不认识</button>' +
      '<button class="btn btn-fuzzy" onclick="extractedAnswer(\'fuzzy\')" title="快捷键: 2">🤔 模糊</button>' +
      '<button class="btn btn-know" onclick="extractedAnswer(\'know\')" title="快捷键: 3">✅ 认识</button>' +
    '</div>' +
    '<div class="stats">' +
      '<span><span class="dot dot-forget"></span> 不认识 ' + ss.stats.forget + '</span>' +
      '<span><span class="dot dot-fuzzy"></span> 模糊 ' + ss.stats.fuzzy + '</span>' +
      '<span><span class="dot dot-know"></span> 认识 ' + ss.stats.know + '</span>' +
    '</div>' +
    '<div class="keyboard-hint">空格 = 显示释义 &nbsp;|&nbsp; 1 = 不认识 &nbsp;|&nbsp; 2 = 模糊 &nbsp;|&nbsp; 3 = 认识</div>';
}

function extractedToggleReveal() {
  AppState.sessionState.revealed = true;
  var meaningEl = document.getElementById('extracted-meaning');
  var exampleEl = document.getElementById('extracted-example');
  var exampleCnEl = document.getElementById('extracted-example-cn');
  if (meaningEl) meaningEl.classList.remove('hidden');
  if (exampleEl) exampleEl.classList.remove('hidden');
  if (exampleCnEl) exampleCnEl.classList.remove('hidden');
}

function extractedAnswer(type) {
  var ss = AppState.sessionState;
  if (!ss.revealed) { extractedToggleReveal(); return; }

  var w = ss.deck[ss.currentIndex];

  // Update stats
  ss.stats[type]++;

  // Update progress record
  var today = new Date().toISOString().slice(0, 10);
  var masteryLevel = type;

  if (!AppState.data.progress[w.word]) {
    AppState.data.progress[w.word] = {
      masteryLevel: masteryLevel,
      learnedDate: today,
      lastReviewDate: null,
      nextReviewDate: null,
      consecutiveKnown: 0,
      mastered: false,
      history: []
    };
  }

  // Use ReviewEngine to update review schedule
  ReviewEngine.updateReview(AppState.data, w.word, masteryLevel);

  // Add to reviewQueue if forget or fuzzy
  if (type === 'forget' || type === 'fuzzy') {
    ss.reviewQueue.push(w);
  }

  // Increment currentIndex
  ss.currentIndex++;

  // Save session
  AppState.saveSession();

  // Render next card
  renderExtractedCard();
}

// 打乱顺序
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let deck = shuffle([...words]);
let current = 0;
let revealed = false;
let stats = { forget: 0, fuzzy: 0, know: 0 };
let reviewQueue = [];

const app = document.getElementById('app');

function render() {
  if (current >= deck.length) {
    if (reviewQueue.length > 0) {
      deck = shuffle([...reviewQueue]);
      reviewQueue = [];
      current = 0;
      render();
      return;
    }
    renderComplete();
    return;
  }
  const w = deck[current];
  const total = deck.length;
  const pct = Math.round((current / total) * 100);
  revealed = false;

  app.innerHTML = `
    <div class="progress-bar">
      <span>${current + 1} / ${total}</span>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span>${pct}%</span>
    </div>
    <div class="category">${w.category}</div>
    <div class="word">${w.word}</div>
    <div class="phonetic">${w.phonetic}</div>
    <div class="meaning hidden" id="meaning" onclick="toggleReveal()">
      ${w.meaning}
      <span class="hint">点击或按空格显示释义</span>
    </div>
    <div class="example hidden" id="example">${w.example}</div>
    <div class="btns">
      <button class="btn btn-forget" onclick="answer('forget')" title="快捷键: 1">😵 不认识</button>
      <button class="btn btn-fuzzy" onclick="answer('fuzzy')" title="快捷键: 2">🤔 模糊</button>
      <button class="btn btn-know" onclick="answer('know')" title="快捷键: 3">✅ 认识</button>
    </div>
    <div class="stats">
      <span><span class="dot dot-forget"></span> 不认识 ${stats.forget}</span>
      <span><span class="dot dot-fuzzy"></span> 模糊 ${stats.fuzzy}</span>
      <span><span class="dot dot-know"></span> 认识 ${stats.know}</span>
    </div>
    <div class="keyboard-hint">空格 = 显示释义 &nbsp;|&nbsp; 1 = 不认识 &nbsp;|&nbsp; 2 = 模糊 &nbsp;|&nbsp; 3 = 认识</div>
  `;
}

function toggleReveal() {
  revealed = true;
  document.getElementById('meaning').classList.remove('hidden');
  document.getElementById('example').classList.remove('hidden');
}

function answer(type) {
  if (!revealed) { toggleReveal(); return; }
  const w = deck[current];
  stats[type]++;
  if (type === 'forget') reviewQueue.push(w);
  if (type === 'fuzzy') reviewQueue.push(w);
  current++;
  render();
}

function renderComplete() {
  const total = stats.forget + stats.fuzzy + stats.know;
  const knowPct = total ? Math.round((stats.know / total) * 100) : 0;
  app.innerHTML = `
    <div class="complete">
      <h2>🎉 本轮完成</h2>
      <p>共学习 ${total} 个单词</p>
      <p>✅ 认识 ${stats.know} &nbsp; 🤔 模糊 ${stats.fuzzy} &nbsp; 😵 不认识 ${stats.forget}</p>
      <p>掌握率 ${knowPct}%</p>
      <button class="restart" onclick="restart()">再来一轮</button>
    </div>
  `;
}

function restart() {
  deck = shuffle([...words]);
  current = 0;
  stats = { forget: 0, fuzzy: 0, know: 0 };
  reviewQueue = [];
  render();
}

document.addEventListener('keydown', e => {
  const view = AppState.currentView;
  
  // Escape key: return to previous level
  if (e.key === 'Escape') {
    if (view === 'dailyLearn' || view === 'review' || view === 'library' || view === 'extractedLearn' || view === 'settings') {
      AppState.switchView('dashboard');
    } else if (view === 'wordDetail') {
      AppState.switchView('library');
    }
    return;
  }
  
  // Space and 1/2/3 only work in learning/review modes
  if (view === 'dailyLearn') {
    if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); dailyToggleReveal(); }
    if (e.key === '1') dailyAnswer('forget');
    if (e.key === '2') dailyAnswer('fuzzy');
    if (e.key === '3') dailyAnswer('know');
  } else if (view === 'review') {
    if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); reviewToggleReveal(); }
    if (e.key === '1') reviewAnswer('forget');
    if (e.key === '2') reviewAnswer('fuzzy');
    if (e.key === '3') reviewAnswer('know');
  } else if (view === 'extractedLearn') {
    if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); extractedToggleReveal(); }
    if (e.key === '1') extractedAnswer('forget');
    if (e.key === '2') extractedAnswer('fuzzy');
    if (e.key === '3') extractedAnswer('know');
  }
  // Dashboard and other views: no 1/2/3 shortcuts
});

AppState.init();

if (typeof module !== 'undefined' && module.exports) {
  module.exports = { Storage, PlanEngine, ReviewEngine, Extractor, AppState, TTS, speakBtnHtml, renderDailyLearn, renderCurrentCard, dailyAnswer, dailyToggleReveal, renderReview, renderReviewCard, reviewToggleReveal, reviewAnswer, renderLibrary, renderWordDetail, filterLibraryWords, updateLibraryFilter, renderExtractedLearn, renderExtractedCard, extractedToggleReveal, extractedAnswer, _getLibraryFilters: () => _libraryFilters, _setLibraryFilters: (f) => { _libraryFilters = f; } };
}
</script>
